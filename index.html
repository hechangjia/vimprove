<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interactive Vim Training - Master Vim motions through browser-based challenges" />
    <meta name="theme-color" content="#0c0a09" />
    <script>
      try {
        const raw = localStorage.getItem('vimprove-settings');
        if (raw) {
          const parsed = JSON.parse(raw);
          const theme = parsed && parsed.theme;
          if (theme === 'dark' || theme === 'light') {
            document.documentElement.setAttribute('data-theme', theme);
          }
        }
      } catch {}
    </script>
    <link rel="stylesheet" href="/src/styles/theme.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet" />
    <title>Vimprove - Interactive Vim Training</title>
    <style>
      body {
        margin: 0;
        background-color: rgb(var(--color-background, 12 10 9));
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: rgb(var(--color-background, 12 10 9));
      }
      #loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgb(var(--color-border, 41 37 36));
        border-top-color: rgb(var(--color-primary, 34 197 94));
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="loading">
      <div id="loading-spinner"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
